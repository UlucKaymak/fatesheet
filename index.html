<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FateSheet - Fate Core Character Sheet</title>
    <meta name="description" content="A digital character sheet manager for the Fate tabletop roleplaying game system.">
    
    <meta property="og:title" content="FateSheet">
    <meta property="og:description" content="Digital character sheet manager for the Fate TTRPG system.">
    <meta property="og:image" content="/apps/fate-sheet/manifest.json">

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://unpkg.com/@pdf-lib/fontkit@0.0.4/dist/fontkit.umd.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header-bar">
            <h1><i data-lucide="shield"></i> FateSheet</h1>
            <div class="header-actions">
                <button class="icon-btn" onclick="downloadPDF()" title="Download PDF">
                    <i data-lucide="download"></i>
                </button>
                <button class="icon-btn" onclick="toggleDarkMode()" title="Toggle Dark Mode" id="dark-mode-toggle">
                    <i data-lucide="moon"></i>
                </button>
                <a href="https://matita.github.io/fatedice/" target="_blank" class="icon-btn" title="Fate Dice">
                    <i data-lucide="dices"></i>
                </a>
                <button class="icon-btn" onclick="openCharacterManager()" title="Manage Characters">
                    <i data-lucide="users"></i>
                </button>
            </div>
        </div>

        <div class="character-sheet">
            <!-- Row 1: Identity & Fate Points -->
            <div class="row-identity-fate">
                <!-- Identity Card -->
                <div class="card">
                    <h2><i data-lucide="user"></i> Identity</h2>
                    <div class="form-group">
                        <label>Character Name</label>
                        <input type="text" name="character-name" id="character-name">
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div class="form-group">
                            <label>Campaign</label>
                            <input type="text" name="campaign" id="campaign">
                        </div>
                        <div class="form-group">
                            <label>Player</label>
                            <input type="text" name="player-name">
                        </div>
                    </div>
                </div>

                <!-- Fate Points Card -->
                <div class="card">
                    <h2><i data-lucide="zap"></i> Fate Points</h2>
                    <div style="display: flex; flex-direction: column; gap: 15px;">
                        <div style="display: flex; align-items: flex-end; gap: 10px;">
                            <div class="form-group" style="flex: 1; margin-bottom: 0;">
                                <label>Refresh Value</label>
                                <input type="number" id="refresh-input" value="3" onchange="updateRefresh()">
                            </div>
                            <button class="btn btn-primary" onclick="resetFatePoints()" style="width: auto; padding: 10px 15px; margin: 0;">
                                <i data-lucide="rotate-ccw" style="width: 16px; height: 16px;"></i>
                            </button>
                        </div>
                        <div class="fate-points" id="fate-points-track"></div>
                    </div>
                </div>
            </div>

            <!-- Row 2: Aspects Partition -->
            <div class="card">
                <h2><i data-lucide="sparkles"></i> Aspects</h2>
                <div style="display: flex; flex-direction: column; gap: 15px;">
                    <div class="form-group">
                        <label>High Concept</label>
                        <input type="text" name="high-concept" placeholder="Core identity">
                    </div>
                    <div class="form-group">
                        <label>Trouble</label>
                        <input type="text" name="trouble" placeholder="Your major flaw">
                    </div>
                    <div class="form-group">
                        <label>Aspect 3</label>
                        <input type="text" name="aspect-3">
                    </div>
                    <div class="form-group">
                        <label>Aspect 4</label>
                        <input type="text" name="aspect-4">
                    </div>
                    <div class="form-group">
                        <label>Aspect 5</label>
                        <input type="text" name="aspect-5">
                    </div>
                </div>
            </div>

            <!-- Row 3: Skills -->
            <div class="row-skills card">
                <h2><i data-lucide="trending-up"></i> Skills Pyramid</h2>
                <div id="skills-container">
                    <!-- Skills generated by JS -->
                </div>
            </div>

            <!-- Row 4: Stunts & Extras -->
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">
                <div class="card">
                    <h2><i data-lucide="zap"></i> Stunts</h2>
                    <textarea name="stunts" placeholder="Special abilities..." style="width: 100%; min-height: 150px; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 10px; font-family: inherit; resize: vertical;"></textarea>
                </div>
                <div class="card">
                    <h2><i data-lucide="package"></i> Extras</h2>
                    <textarea name="extras" placeholder="Gear, companions, organizations..." style="width: 100%; min-height: 150px; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 10px; font-family: inherit; resize: vertical;"></textarea>
                </div>
            </div>

            <!-- Row 5: Health & Stress -->
            <div class="row-health card">
                <h2><i data-lucide="activity"></i> Health & Stress</h2>
                <div class="health-container">
                    <!-- Stress Tracks Row -->
                    <div class="stress-row">
                        <div class="stress-group">
                            <label>Physical Stress</label>
                            <div class="stress-track" id="physical-stress">
                                <div class="stress-box" onclick="toggleStress(this)">1</div>
                                <div class="stress-box" onclick="toggleStress(this)">2</div>
                                <div class="stress-box" onclick="toggleStress(this)">3</div>
                                <div class="stress-box" onclick="toggleStress(this)">4</div>
                                <div class="stress-box high-stress" onclick="toggleStress(this)">5</div>
                                <div class="stress-box high-stress" onclick="toggleStress(this)">6</div>
                            </div>
                        </div>
                        <div class="stress-group">
                            <label>Mental Stress</label>
                            <div class="stress-track" id="mental-stress">
                                <div class="stress-box" onclick="toggleStress(this)">1</div>
                                <div class="stress-box" onclick="toggleStress(this)">2</div>
                                <div class="stress-box" onclick="toggleStress(this)">3</div>
                                <div class="stress-box" onclick="toggleStress(this)">4</div>
                                <div class="stress-box high-stress" onclick="toggleStress(this)">5</div>
                                <div class="stress-box high-stress" onclick="toggleStress(this)">6</div>
                            </div>
                        </div>
                    </div>

                    <!-- Consequences Row -->
                    <div class="consequences-section">
                        <label>Consequences</label>
                        <div class="consequences-row">
                            <div class="form-group">
                                <input type="text" name="con-mild" placeholder="Mild (2)">
                            </div>
                            <div class="form-group">
                                <input type="text" name="con-mild-text" placeholder="Mild (2)" style="width: 100%;">
                            </div>
                            <div class="form-group">
                                <input type="text" name="con-mod" placeholder="Moderate (4)">
                            </div>
                            <div class="form-group">
                                <input type="text" name="con-sev" placeholder="Severe (6)">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Row 6: Inventory & Notes -->
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">
                <div class="card">
                    <h2><i data-lucide="shopping-bag"></i> Inventory</h2>
                    <textarea name="inventory" placeholder="Carried items..." style="width: 100%; min-height: 150px; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 10px; font-family: inherit; resize: vertical;"></textarea>
                    <div class="form-group" style="margin-top: 10px;">
                        <label>Currency</label>
                        <input type="text" name="currency">
                    </div>
                </div>
                <div class="card">
                    <h2><i data-lucide="sticky-note"></i> Adventure Notes</h2>
                    <textarea name="notes" placeholder="Session logs, NPCs, clues..." style="width: 100%; min-height: 150px; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 10px; font-family: inherit; resize: vertical;"></textarea>
                </div>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div class="modal-backdrop" id="modal-backdrop" onclick="closeModals()"></div>
    
    <!-- Manager Modal -->
    <div class="modal" id="manager-modal">
        <h3>Character Manager</h3>
        
        <div style="background: var(--bg); padding: 15px; border-radius: 10px; margin-bottom: 20px;">
            <div class="form-group">
                <label>Character Name</label>
                <input type="text" id="save-name-input" placeholder="Character Name">
            </div>
            <button class="btn btn-primary" onclick="confirmSave()" style="margin-top: 0;">
                <i data-lucide="save" style="width: 16px; height: 16px; vertical-align: middle; margin-right: 5px;"></i> Save Current
            </button>
        </div>

        <label>Saved Characters</label>
        <div id="character-list" style="margin-top: 10px;"></div>
        
        <button class="btn btn-secondary" onclick="closeModals()">Close</button>
    </div>

    <!-- Skill Selector Modal -->
    <div class="modal" id="skill-modal">
        <h3>Select Skill</h3>
        <div id="skill-options" style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;"></div>
        <button class="btn btn-secondary" onclick="clearSkill()">Clear Slot</button>
    </div>

    <script>
        // Data & State
        const SKILLS_LIST = ['Athletics', 'Burglary', 'Contacts', 'Crafts', 'Deceive', 'Drive', 'Empathy', 'Fight', 'Investigate', 'Lore', 'Notice', 'Physique', 'Provoke', 'Rapport', 'Resources', 'Shoot', 'Stealth', 'Will'];
        const TIERS = [
            { label: 'Superb (+5)', slots: 5, active: 5, bonus: '+5', fields: ['Superb 5', '2', '2_2', '2_2a', '2_3'] },
            { label: 'Great (+4)', slots: 5, active: 5, bonus: '+4', fields: ['Great 4', '1_4', '1_5', '1_5a', '1_7'] },
            { label: 'Good (+3)', slots: 5, active: 5, bonus: '+3', fields: ['Good 3', '2_4', '2_5', '1_6', '2_7'] },
            { label: 'Fair (+2)', slots: 5, active: 5, bonus: '+2', fields: ['Fair 2', '3', '3_2', '2_6', '3_4'] },
            { label: 'Average (+1)', slots: 5, active: 5, bonus: '+1', fields: ['Average 1', '4', '4_2', '3_3', '4_3'] }
        ];

        let savedCharacters = {};
        let activeSlot = null;
        let usedSkills = new Set();

        // Download PDF
        async function downloadPDF() {
            const btn = document.querySelector('button[onclick="downloadPDF()"]');
            const originalIcon = btn.innerHTML;
            btn.innerHTML = '<i data-lucide="loader" class="spin" style="width:16px; height:16px;"></i>';
            if(window.lucide) lucide.createIcons();

            try {
                const { PDFDocument } = PDFLib;
                const [pdfBytes, fontBytes] = await Promise.all([
                    fetch('FateCore-FillableSheet.pdf').then(res => res.arrayBuffer()),
                    fetch('https://pdf-lib.js.org/assets/ubuntu/Ubuntu-R.ttf').then(res => res.arrayBuffer())
                ]);

                const pdfDoc = await PDFDocument.load(pdfBytes);
                pdfDoc.registerFontkit(fontkit);
                const customFont = await pdfDoc.embedFont(fontBytes);
                const form = pdfDoc.getForm();

                const setField = (name, value, size = 9) => {
                    try {
                        const field = form.getTextField(name);
                        // Auto-shrink font size if text is long
                        let fontSize = size;
                        if (value && value.length > 25) fontSize = 8;
                        if (value && value.length > 45) fontSize = 7;
                        if (value && value.length > 65) fontSize = 6;
                        
                        field.setText(value || '');
                        field.setFontSize(fontSize);
                        
                        // Try to center text vertically if the library supports it via appearance
                        try { 
                            field.setAlignment(PDFLib.TextAlignment.Center);
                        } catch(e) {}

                        try { field.updateAppearances(customFont); } catch(e) {}
                    } catch(e) {}
                };

                setField('CharacterName', document.getElementById('character-name').value);
                setField('HighConcept', document.querySelector('[name="high-concept"]').value);
                setField('Trouble', document.querySelector('[name="trouble"]').value);
                setField('Refresh', document.getElementById('refresh-input').value);
                
                // Campaign & Player
                setField('Description', document.getElementById('campaign').value); 
                setField('bcha046', document.querySelector('[name="player-name"]').value);

                // Aspects 3-5 (Description only)
                setField('CustomAspect1Descr', document.querySelector('[name="aspect-3"]').value);
                setField('CustomAspect2Descr', document.querySelector('[name="aspect-4"]').value);
                setField('CustomAspect3Descr', document.querySelector('[name="aspect-5"]').value);

                const slots = document.querySelectorAll('.skill-tier');
                TIERS.forEach((tier, tIdx) => {
                    const tierDiv = slots[tIdx];
                    if (!tierDiv) return;
                    const skillSlots = tierDiv.querySelectorAll('.skill-slot:not(.inactive)');
                    skillSlots.forEach((slot, sIdx) => {
                        const skillName = slot.textContent;
                        if (skillName && skillName !== 'Empty') {
                            const fieldName = tier.fields[sIdx];
                            if (fieldName) setField(fieldName, skillName);
                        }
                    });
                });

                document.querySelectorAll('#physical-stress .stress-box').forEach((box, i) => {
                    try {
                        const f = form.getField(`PhysicalStress${i+1}`);
                        if (box.classList.contains('checked')) {
                            if (f.constructor.name === 'PDFCheckBox') f.check();
                            else f.setText('X');
                        }
                    } catch (e) {}
                });

                document.querySelectorAll('#mental-stress .stress-box').forEach((box, i) => {
                    try {
                        const f = form.getField(`MentalStress${i+1}`);
                        if (box.classList.contains('checked')) {
                            if (f.constructor.name === 'PDFCheckBox') f.check();
                            else f.setText('X');
                        }
                    } catch (e) {}
                });

                setField('CONSEQUENCES 1', document.querySelector('[name="con-mild"]').value + " " + (document.querySelector('[name="con-mild-text"]').value || ''));
                setField('CONSEQUENCES 2', document.querySelector('[name="con-mod"]').value);
                setField('CONSEQUENCES 3', document.querySelector('[name="con-sev"]').value);

                // Stunts & Extras
                setField('STUNTS', document.querySelector('[name="stunts"]').value, 8);
                setField('EXTRAS', document.querySelector('[name="extras"]').value, 8);

                // Inventory & Currency
                setField('Inventory', document.querySelector('[name="inventory"]').value, 8);
                setField('Currency', document.querySelector('[name="currency"]').value);

                // Bio & Notes
                setField('AdventureNotes', document.querySelector('[name="notes"]').value, 8);

                const pdfResultBytes = await pdfDoc.save();
                const blob = new Blob([pdfResultBytes], { type: 'application/pdf' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `${document.getElementById('character-name').value || 'FateCharacter'}.pdf`;
                link.click();
            } catch (error) {
                console.error(error);
                alert('PDF support error. Check your connection or special characters.');
            } finally {
                btn.innerHTML = originalIcon;
                if(window.lucide) lucide.createIcons();
            }
        }

        // Init
        document.addEventListener('DOMContentLoaded', async () => {
            initDarkMode();
            lucide.createIcons();
            buildSkills();
            updateRefresh();
            await loadFromCloud();
        });

        // Dark Mode Logic
        function initDarkMode() {
            const savedDarkMode = localStorage.getItem('dark-mode') === 'true';
            if (savedDarkMode) {
                document.body.classList.add('dark-mode');
                updateDarkModeIcon(true);
            }
        }

        function toggleDarkMode() {
            const body = document.body;
            body.classList.toggle('dark-mode');
            const isDark = body.classList.contains('dark-mode');
            localStorage.setItem('dark-mode', isDark);
            updateDarkModeIcon(isDark);
        }

        function updateDarkModeIcon(isDark) {
            const btn = document.getElementById('dark-mode-toggle');
            if (!btn) return;
            btn.innerHTML = isDark ? '<i data-lucide="sun"></i>' : '<i data-lucide="moon"></i>';
            if (window.lucide) lucide.createIcons();
        }

        function buildSkills() {
            const container = document.getElementById('skills-container');
            container.innerHTML = '';
            TIERS.forEach((tier, tIdx) => {
                const row = document.createElement('div');
                row.className = 'skill-tier';
                
                const label = document.createElement('div');
                label.className = 'skill-label';
                label.textContent = tier.label;
                row.appendChild(label);

                const slotsDiv = document.createElement('div');
                slotsDiv.className = 'skill-tier-slots';

                for(let i=0; i<tier.slots; i++) {
                    const slot = document.createElement('div');
                    slot.className = i < tier.active ? 'skill-slot' : 'skill-slot inactive';
                    slot.textContent = 'Empty';
                    slot.onclick = () => openSkillModal(slot);
                    slotsDiv.appendChild(slot);
                }
                row.appendChild(slotsDiv);
                container.appendChild(row);
            });

            const optContainer = document.getElementById('skill-options');
            SKILLS_LIST.forEach(s => {
                const btn = document.createElement('button');
                btn.className = 'btn btn-secondary';
                btn.style.fontSize = '0.8rem';
                btn.textContent = s;
                btn.onclick = () => selectSkill(s);
                optContainer.appendChild(btn);
            });
        }

        function updateRefresh() {
            const val = document.getElementById('refresh-input').value;
            const container = document.getElementById('fate-points-track');
            container.innerHTML = '';
            for(let i=0; i<val; i++) {
                const p = document.createElement('div');
                p.className = 'fate-point spent';
                p.onclick = () => p.classList.toggle('spent');
                container.appendChild(p);
            }
        }

        function resetFatePoints() {
            document.querySelectorAll('.fate-point').forEach(p => p.classList.add('spent'));
        }

        function toggleStress(el) { el.classList.toggle('checked'); }

        // Modals
        function closeModals() {
            document.querySelectorAll('.modal, .modal-backdrop').forEach(m => m.style.display = 'none');
        }

        function openCharacterManager() {
            document.getElementById('save-name-input').value = document.getElementById('character-name').value;
            renderCharacterList();
            document.getElementById('modal-backdrop').style.display = 'block';
            document.getElementById('manager-modal').style.display = 'block';
        }

        function openSkillModal(slot) {
            activeSlot = slot;
            document.getElementById('modal-backdrop').style.display = 'block';
            document.getElementById('skill-modal').style.display = 'block';
        }

        // Logic
        function selectSkill(name) {
            if(usedSkills.has(name)) { alert('Already used'); return; }
            if(activeSlot.textContent !== 'Empty') usedSkills.delete(activeSlot.textContent);
            usedSkills.add(name);
            activeSlot.textContent = name;
            activeSlot.classList.add('filled');
            closeModals();
        }

        function clearSkill() {
            if(activeSlot.textContent !== 'Empty') usedSkills.delete(activeSlot.textContent);
            activeSlot.textContent = 'Empty';
            activeSlot.classList.remove('filled');
            closeModals();
        }

        // Cloud Operations
        async function loadFromCloud() {
            try {
                const res = await fetch('/api/characters');
                if(res.ok) savedCharacters = await res.json();
            } catch(e) { 
                // Quietly fail for local development or missing functions
            }
        }

        async function confirmSave() {
            const name = document.getElementById('save-name-input').value;
            if(!name) return;

            const data = {
                name,
                fields: {},
                skills: Array.from(document.querySelectorAll('.skill-slot')).map(s => s.textContent),
                stress: {
                    physical: Array.from(document.querySelectorAll('#physical-stress .stress-box')).map(b => b.classList.contains('checked')),
                    mental: Array.from(document.querySelectorAll('#mental-stress .stress-box')).map(b => b.classList.contains('checked'))
                },
                fate: document.querySelectorAll('.fate-point.spent').length,
                refresh: document.getElementById('refresh-input').value,
                updatedAt: new Date().toISOString()
            };

            document.querySelectorAll('input, textarea').forEach(i => {
                if(i.name) data.fields[i.name] = i.value;
            });

            const id = Date.now().toString();
            savedCharacters[id] = data;

            const res = await fetch('/api/characters', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(savedCharacters)
            });

            if(res.ok) {
                closeModals();
                alert('Saved to Cloud!');
            }
        }

        function renderCharacterList() {
            const container = document.getElementById('character-list');
            container.innerHTML = '';
            Object.entries(savedCharacters).forEach(([id, char]) => {
                const div = document.createElement('div');
                div.className = 'character-item';
                div.innerHTML = `
                    <span><b>${char.name}</b> <br><small>${new Date(char.updatedAt).toLocaleString()}</small></span>
                    <div>
                        <button class="btn btn-primary" style="width:auto; display:inline;" onclick="loadCharacter('${id}')">Load</button>
                        <button class="btn btn-secondary" style="width:auto; display:inline; color:red;" onclick="deleteCharacter('${id}')">X</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function loadCharacter(id) {
            const char = savedCharacters[id];
            
            // First pass for all generic inputs/textareas
            Object.entries(char.fields).forEach(([name, val]) => {
                const el = document.querySelector(`[name="${name}"]`);
                if(el) el.value = val;
            });
            
            // Second pass for specific IDs or special cases
            if (char.fields['campaign']) document.getElementById('campaign').value = char.fields['campaign'];

            document.getElementById('refresh-input').value = char.refresh || 3;
            updateRefresh();

            const slots = document.querySelectorAll('.skill-slot');
            usedSkills.clear();
            char.skills.forEach((s, i) => {
                const skillName = (s && s.trim()) ? s : 'Empty';
                slots[i].textContent = skillName;
                if(skillName !== 'Empty') {
                    slots[i].classList.add('filled');
                    usedSkills.add(skillName);
                } else {
                    slots[i].classList.remove('filled');
                }
            });

            const pStress = document.querySelectorAll('#physical-stress .stress-box');
            char.stress.physical.forEach((v, i) => v ? pStress[i].classList.add('checked') : pStress[i].classList.remove('checked'));
            
            const mStress = document.querySelectorAll('#mental-stress .stress-box');
            char.stress.mental.forEach((v, i) => v ? mStress[i].classList.add('checked') : mStress[i].classList.remove('checked'));

            closeModals();
        }

        async function deleteCharacter(id) {
            if(!confirm('Delete?')) return;
            delete savedCharacters[id];
            await fetch('/api/characters', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(savedCharacters)
            });
            renderCharacterList();
        }
    </script>
</body>
</html>
